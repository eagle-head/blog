# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Avoid concurrent runs for the same ref eating the CI minutes; latest push wins.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint · Markdown
        run: npm run lint:md

      - name: Format check
        run: npm run format:check

      - name: Typecheck (astro sync + astro check)
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
